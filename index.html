<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GradGuard" />
    <title>GradGuard - Student Dropout Prediction System</title>
    <meta name="description" content="AI-powered student dropout prediction and intervention system" />
    <meta name="author" content="GradGuard" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <meta property="og:title" content="GradGuard - Student Dropout Prediction" />
    <meta property="og:description" content="AI-powered student dropout prediction and intervention system" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <!-- Initial loading screen with theme-aware styling -->
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 9999;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
          <div style="width: 48px; height: 48px; border: 3px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
          <span style="font-family: 'Inter', sans-serif; font-size: 14px; opacity: 0.7;">Loading...</span>
        </div>
      </div>
    </div>
    
    <!-- Theme detection script - runs before React hydrates -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        // Apply theme-aware colors to loader
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.backgroundColor = theme === 'dark' ? 'hsl(222.2, 47.4%, 8%)' : 'hsl(240, 20%, 99%)';
          loader.style.color = theme === 'dark' ? 'hsl(210, 40%, 98%)' : 'hsl(222.2, 47.4%, 11.2%)';
        }
      })();
    </script>
    
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Hide initial loader once React mounts */
      #root:not(:empty) #initial-loader {
        display: none !important;
      }
    </style>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
